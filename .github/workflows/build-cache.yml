name: Build Cache

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build-cache
        run: E2ME_EMAIL=${{ vars.E2ME_EMAIL }} E2ME_PASSWD=${{ vars.E2ME_PASSWD }} python3 build-cache.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/ paper_cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update generated assets and cache"
          git push origin HEAD:${GITHUB_REF_NAME}
