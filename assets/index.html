<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A 类系统会议论文浏览</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Paper Abstract Viewer</div>
        <h1>系统领域会议录稿论文</h1>
      </div>
      <div class="hero-note">
        <span class="note-label">数据源</span>
        <span class="note-value">DBLP + OpenAlex</span>
      </div>
    </section>

    <section class="view-tabs">
      <button class="view-tab is-active" data-view="browse">浏览论文</button>
      <button class="view-tab" data-view="favorites">我的喜欢</button>
      <button class="view-tab" data-view="viewed">已看完</button>
      <button class="view-tab" data-view="disliked">不感兴趣</button>
    </section>

    <section class="panel filters" id="filtersPanel">
      <div class="filter-group">
        <span class="filter-label">会议</span>
        <div class="filter-chips" id="conferenceFilters"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">年份</span>
        <div class="filter-chips" id="yearFilters"></div>
      </div>
      <div class="filter-toolbar">
        <label class="field field-grow">
        <span>关键词</span>
        <input id="keyword" type="search" placeholder="标题 / 作者 / 摘要" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </label>
        <label class="check">
          <input id="hasAbstract" type="checkbox">
          <span>只看有摘要</span>
        </label>
      </div>
    </section>

    <div class="status" id="loading">正在加载数据...</div>
    <section class="results" id="results"></section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
