<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A 类系统会议论文浏览</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Paper Abstract Viewer</div>
        <h1>系统领域会议录稿论文</h1>
      </div>
      <div class="hero-note">
        <span class="note-label">数据源</span>
        <span class="note-value">DBLP + OpenAlex</span>
      </div>
    </section>

    <section class="view-tabs">
      <button class="view-tab is-active" data-view="browse">浏览论文</button>
      <button class="view-tab" data-view="favorites">我的喜欢</button>
      <button class="view-tab" data-view="viewed">已看完</button>
    </section>

    <section class="panel filters" id="filtersPanel">
      <label class="field">
        <span>会议</span>
        <select id="conference">
          <option value="osdi">OSDI</option>
          <option value="nsdi">NSDI</option>
          <option value="sosp">SOSP</option>
          <option value="asplos">ASPLOS</option>
          <option value="eurosys">EuroSys</option>
          <option value="fast">FAST</option>
          <option value="dac">DAC</option>
          <option value="isca">ISCA</option>
          <option value="micro">MICRO</option>
          <option value="hpca">HPCA</option>
          <option value="sigmod">SIGMOD</option>
          <option value="sigcomm">SIGCOMM</option>
        </select>
      </label>
      <label class="field">
        <span>年份</span>
        <select id="year">
          <option value="">全部年份</option>
        </select>
      </label>
      <label class="field field-grow">
        <span>关键词</span>
        <input id="keyword" type="search" placeholder="标题 / 作者 / 摘要" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </label>
      <label class="field">
        <span>排序</span>
        <select id="sort">
          <option value="year_desc">年份降序</option>
          <option value="title_asc">标题 A-Z</option>
        </select>
      </label>
      <label class="check">
        <input id="hasAbstract" type="checkbox">
        <span>只看有摘要</span>
      </label>
    </section>

    <section class="stats" id="summary"></section>
    <div class="status" id="loading">正在加载数据...</div>
    <section class="results" id="results"></section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
